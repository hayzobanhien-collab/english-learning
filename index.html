<script>
    // Dữ liệu kho từ vựng gốc
    const masterVocabulary = [
        { word: "Implement", type: "verb", detail: "Triển khai, thực hiện một kế hoạch/hệ thống", example: "We need to implement a new security protocol for the website.", category: "it" },
        { word: "Ambiguous", type: "adjective", detail: "Mơ hồ, nhập nhằng, không rõ ràng", example: "The error message was too ambiguous to resolve immediately.", category: "it" },
        { word: "Efficiency", type: "noun", detail: "Hiệu suất, sự hiệu quả công việc", example: "Optimizing the database structure will increase application efficiency.", category: "it" },
        { word: "Redundant", type: "adjective", detail: "Dư thừa, không cần thiết", example: "Removing redundant variables makes the script run significantly cleaner.", category: "it" },
        { word: "Simultaneous", type: "adjective", detail: "Đồng thời, xảy ra cùng một lúc", example: "The platform handles thousands of simultaneous users perfectly.", category: "it" },
        { word: "Acquire", type: "verb", detail: "Thu được, đạt được, giành được", example: "She managed to acquire a good knowledge of English in just one year.", category: "oxford" },
        { word: "Evaluate", type: "verb", detail: "Đánh giá, định giá chất lượng/giá trị", example: "The research project will evaluate the long-term effects of climate change.", category: "oxford" },
        { word: "Resilient", type: "adjective", detail: "Kiên cường, có khả năng phục hồi nhanh chóng", example: "He is a resilient businessman who defeated every failure.", category: "oxford" },
        { word: "Pragmatic", type: "adjective", detail: "Thực tế, thực dụng", example: "We need to take a pragmatic approach to management issues.", category: "oxford" },
        { word: "Bite the bullet", type: "idiom", detail: "Cắn răng chịu đựng, đối mặt với khó khăn không thể tránh", example: "I hate going to the dentist, but I'll just have to bite the bullet.", category: "idioms" },
        { word: "Break a leg", type: "idiom", detail: "Chúc may mắn", example: "Break a leg tonight! I know your presentation will be great.", category: "idioms" }
    ];

    let vocabulary = [...masterVocabulary];

    const quizQuestions = [
        { q: "Từ nào dưới đây mang ý nghĩa 'triển khai, thực hiện một kế hoạch/hệ thống'?", a: ["Compile", "Implement", "Inherit", "Execute"], correct: 1 },
        { q: "Từ nào trái nghĩa với từ 'clear, obvious' (rõ ràng)?", a: ["Ambiguous", "Redundant", "Efficient", "Simultaneous"], correct: 0 },
        { q: "Điền vào chỗ trống: 'Refactoring code eliminates ______ lines and functions.'", a: ["efficient", "redundant", "essential", "simultaneous"], correct: 1 }
    ];

    let currentCardIndex = 0;
    let currentQuizIndex = 0;
    let score = 0;

    // FIX 3: Reset toàn diện class CSS khi chuyển Tab
    function switchTab(tabId, btn) {
        document.querySelectorAll('.tab-content').forEach(el => {
            el.classList.remove('block');
            el.classList.add('hidden');
        });
        document.getElementById(tabId).classList.remove('hidden');
        document.getElementById(tabId).classList.add('block');
        
        document.querySelectorAll('.tab-btn').forEach(b => {
            b.className = "tab-btn px-4 py-2 rounded-lg text-sm font-medium text-gray-600 hover:text-gray-900 transition";
        });
        btn.className = "tab-btn px-4 py-2 rounded-lg text-sm font-semibold text-blue-600 bg-white shadow-sm transition";
    }

    function filterVocabulary() {
        const selectedCat = document.getElementById('category-select').value;
        if (selectedCat === 'all') {
            vocabulary = [...masterVocabulary];
        } else {
            vocabulary = masterVocabulary.filter(item => item.category === selectedCat);
        }
        currentCardIndex = 0;
        updateCard();
    }

    function updateCard() {
        if (vocabulary.length === 0) {
            document.getElementById('card-word').innerText = "Trống";
            document.getElementById('card-type').innerText = "";
            document.getElementById('card-detail').innerText = "Không có từ vựng nào trong chủ đề này.";
            document.getElementById('card-example').innerText = "";
            document.getElementById('card-progress').innerText = "0 / 0";
            document.getElementById('card-cat-badge').innerText = "None";
            return;
        }
        
        const card = vocabulary[currentCardIndex];
        document.getElementById('card-word').innerText = card.word;
        document.getElementById('card-type').innerText = `(${card.type})`;
        document.getElementById('card-detail').innerText = card.detail;
        document.getElementById('card-example').innerText = `Ví dụ: ${card.example}`;
        document.getElementById('card-progress').innerText = `${currentCardIndex + 1} / ${vocabulary.length}`;
        
        // Cải thiện nhãn hiển thị cho đẹp thay vì in ra id
        const catLabels = { 'it': 'IT & Tech', 'oxford': 'Oxford', 'idioms': 'Idioms' };
        document.getElementById('card-cat-badge').innerText = catLabels[card.category] || card.category;
    }

    function flipCard() {
        if (vocabulary.length > 0) {
            document.getElementById('flashcard').classList.toggle('flipped');
        }
    }

    // FIX 4: Đợi lật bài xong mới chuyển chữ để tránh giật hình
    function smoothTransitionCard(callback) {
        const cardEl = document.getElementById('flashcard');
        if (cardEl.classList.contains('flipped')) {
            cardEl.classList.remove('flipped');
            setTimeout(callback, 250); // Chờ 250ms cho animation lật bài
        } else {
            callback();
        }
    }

    function nextCard() {
        if (vocabulary.length > 0) {
            smoothTransitionCard(() => {
                currentCardIndex = (currentCardIndex + 1) % vocabulary.length;
                updateCard();
            });
        }
    }

    function prevCard() {
        if (vocabulary.length > 0) {
            smoothTransitionCard(() => {
                currentCardIndex = (currentCardIndex - 1 + vocabulary.length) % vocabulary.length;
                updateCard();
            });
        }
    }

    function loadQuiz() {
        if(currentQuizIndex >= quizQuestions.length) {
            document.getElementById('quiz-box').innerHTML = `
                <div class="text-center py-8">
                    <div class="inline-flex bg-yellow-50 text-yellow-500 p-4 rounded-full mb-4">
                        <i class="fas fa-trophy text-4xl"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-2">Hoàn thành bài trắc nghiệm!</h3>
                    <p class="text-gray-500 mb-6">Kết quả của bạn đạt: <span class="font-bold text-blue-600">${score}/${quizQuestions.length}</span></p>
                    <button onclick="resetQuiz()" class="bg-gray-900 hover:bg-gray-800 text-white px-6 py-2.5 rounded-xl text-sm font-semibold transition shadow-md">Làm lại bài test</button>
                </div>
            `;
            return;
        }
        const qData = quizQuestions[currentQuizIndex];
        document.getElementById('quiz-question').innerText = `Câu ${currentQuizIndex + 1}: ${qData.q}`;
        const optionsDiv = document.getElementById('quiz-options');
        optionsDiv.innerHTML = '';
        
        qData.a.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = "w-full text-left px-5 py-3.5 border border-gray-200 rounded-xl hover:bg-slate-50 hover:border-gray-300 transition duration-200 text-sm font-medium focus:outline-none";
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx, btn);
            optionsDiv.appendChild(btn);
        });
        document.getElementById('quiz-next-btn').classList.add('hidden');
    }

    // FIX 2: Bổ sung logic gỡ bỏ border cũ để áp dụng border mới chính xác
    function checkAnswer(selectedIdx, btnElement) {
        const qData = quizQuestions[currentQuizIndex];
        const options = document.getElementById('quiz-options').children;
        
        for(let btn of options) { btn.disabled = true; }
        
        if(selectedIdx === qData.correct) {
            btnElement.classList.replace('hover:bg-slate-50', 'bg-emerald-50');
            btnElement.classList.remove('border-gray-200', 'hover:border-gray-300');
            btnElement.classList.add('border-emerald-400', 'text-emerald-700');
            score++;
            document.getElementById('quiz-score-badge').innerText = `Điểm: ${score}`;
        } else {
            btnElement.classList.replace('hover:bg-slate-50', 'bg-rose-50');
            btnElement.classList.remove('border-gray-200', 'hover:border-gray-300');
            btnElement.classList.add('border-rose-400', 'text-rose-700');
            
            const correctBtn = options[qData.correct];
            correctBtn.classList.replace('hover:bg-slate-50', 'bg-emerald-50');
            correctBtn.classList.remove('border-gray-200', 'hover:border-gray-300');
            correctBtn.classList.add('border-emerald-400', 'text-emerald-700');
        }
        document.getElementById('quiz-next-btn').classList.remove('hidden');
    }

    function nextQuiz() {
        currentQuizIndex++;
        loadQuiz();
    }

    function resetQuiz() {
        currentQuizIndex = 0;
        score = 0;
        document.getElementById('quiz-score-badge').innerText = `Điểm: 0`;
        document.getElementById('quiz-box').innerHTML = `
            <h3 id="quiz-question" class="text-lg font-semibold mb-6 text-gray-800 leading-snug"></h3>
            <div id="quiz-options" class="grid grid-cols-1 gap-3 mb-6"></div>
            <div class="flex justify-end">
                <button id="quiz-next-btn" onclick="nextQuiz()" class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-2.5 rounded-xl transition text-sm font-semibold shadow-md shadow-blue-200 hidden">Câu tiếp theo <i class="fas fa-arrow-right ml-1.5 text-xs"></i></button>
            </div>
        `;
        loadQuiz();
    }

    window.onload = () => {
        updateCard();
        loadQuiz();
    };
</script>
